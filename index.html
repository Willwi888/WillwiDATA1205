
<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Willwi Music Database | Official Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'Noto Sans TC', 'sans-serif'],
            },
            colors: {
              brand: {
                dark: '#0f172a',
                darker: '#020617',
                accent: '#38bdf8',
                gold: '#fbbf24',
                surface: '#1e293b'
              }
            },
            animation: {
              'slow-zoom': 'slowZoom 20s linear infinite',
            },
            keyframes: {
              slowZoom: {
                '0%, 100%': { transform: 'scale(1.1)' },
                '50%': { transform: 'scale(1.2)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translate3d(0, 20px, 0); }
        to { opacity: 1; transform: translate3d(0, 0, 0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.3)); }
        50% { filter: drop-shadow(0 0 40px rgba(251, 191, 36, 0.6)); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }
      .animate-fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }
      .text-gold-glow {
        color: white;
        filter: drop-shadow(0 0 25px rgba(251, 191, 36, 0.4));
        animation: glowPulse 5s ease-in-out infinite;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.5);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(251,191,36,0.3);
        border-radius: 2px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(251,191,36,0.6);
      }
      body { background-color: #020617; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.10.1",
    "idb": "https://cdn.jsdelivr.net/npm/idb@8.0.0/+esm"
  }
}
</script>
</head>
  <body class="text-slate-100 antialiased font-sans">
    <div id="root"></div>
  </body>
</html>
